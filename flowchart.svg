<svg width="100%" viewBox="0 0 680 922" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif">
<defs>
  <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="ae" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#993C1D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="ap" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="at" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="as" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#378ADD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect width="680" height="922" fill="white"/>

<!-- START pill -->
<rect x="270" y="18" width="140" height="36" rx="18" fill="#2C2C2A"/>
<text x="340" y="36" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="white" letter-spacing="1">START</text>

<line x1="340" y1="54" x2="340" y2="73" stroke="#888780" stroke-width="1.5" marker-end="url(#a)"/>

<!-- setMaxAmount -->
<rect x="200" y="75" width="240" height="42" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="320" y="91" text-anchor="middle" font-size="13" font-weight="600" fill="#2C2C2A">setMaxAmount()</text>
<text x="320" y="108" text-anchor="middle" font-size="10" fill="#5F5E5A">configure session limit — once per session</text>

<line x1="320" y1="117" x2="320" y2="147" stroke="#888780" stroke-width="1.5" marker-end="url(#a)"/>

<!-- ═══════════ CARD MODULE ═══════════ -->
<rect x="20" y="149" width="640" height="204" rx="10" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
<rect x="20" y="149" width="8" height="204" rx="4" fill="#534AB7"/>
<text x="38" y="165" font-size="10" font-weight="600" fill="#534AB7" letter-spacing="1">CARD MODULE</text>

<!-- getCardHolderName -->
<rect x="200" y="174" width="240" height="42" rx="6" fill="white" stroke="#7F77DD" stroke-width="0.75"/>
<text x="320" y="190" text-anchor="middle" font-size="12" font-weight="600" fill="#26215C">getCardHolderName()</text>
<text x="320" y="207" text-anchor="middle" font-size="10" fill="#534AB7">name: 20–24 alphabetic characters</text>
<line x1="440" y1="195" x2="459" y2="195" stroke="#993C1D" stroke-width="1" marker-end="url(#ae)"/>
<rect x="461" y="181" width="185" height="28" rx="5" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="553" y="195" text-anchor="middle" dominant-baseline="central" font-size="10.5" fill="#712B13">WRONG_NAME  →  retry</text>

<line x1="320" y1="216" x2="320" y2="234" stroke="#534AB7" stroke-width="1" marker-end="url(#ap)"/>

<!-- getCardExpiryDate -->
<rect x="200" y="236" width="240" height="42" rx="6" fill="white" stroke="#7F77DD" stroke-width="0.75"/>
<text x="320" y="252" text-anchor="middle" font-size="12" font-weight="600" fill="#26215C">getCardExpiryDate()</text>
<text x="320" y="269" text-anchor="middle" font-size="10" fill="#534AB7">format: MM/YY  (month 01–12)</text>
<line x1="440" y1="257" x2="459" y2="257" stroke="#993C1D" stroke-width="1" marker-end="url(#ae)"/>
<rect x="461" y="243" width="185" height="28" rx="5" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="553" y="257" text-anchor="middle" dominant-baseline="central" font-size="10.5" fill="#712B13">WRONG_EXP_DATE  →  retry</text>

<line x1="320" y1="278" x2="320" y2="296" stroke="#534AB7" stroke-width="1" marker-end="url(#ap)"/>

<!-- getCardPAN -->
<rect x="200" y="298" width="240" height="42" rx="6" fill="white" stroke="#7F77DD" stroke-width="0.75"/>
<text x="320" y="314" text-anchor="middle" font-size="12" font-weight="600" fill="#26215C">getCardPAN()</text>
<text x="320" y="331" text-anchor="middle" font-size="10" fill="#534AB7">PAN: 16–19 numeric digits only</text>
<line x1="440" y1="319" x2="459" y2="319" stroke="#993C1D" stroke-width="1" marker-end="url(#ae)"/>
<rect x="461" y="305" width="185" height="28" rx="5" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="553" y="319" text-anchor="middle" dominant-baseline="central" font-size="10.5" fill="#712B13">WRONG_PAN  →  retry</text>

<line x1="320" y1="340" x2="320" y2="367" stroke="#888780" stroke-width="1.5" marker-end="url(#a)"/>

<!-- ═══════════ TERMINAL MODULE ═══════════ -->
<rect x="20" y="369" width="640" height="276" rx="10" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
<rect x="20" y="369" width="8" height="276" rx="4" fill="#1D9E75"/>
<text x="38" y="385" font-size="10" font-weight="600" fill="#0F6E56" letter-spacing="1">TERMINAL MODULE</text>

<!-- isCardExpired -->
<rect x="200" y="394" width="240" height="42" rx="6" fill="white" stroke="#1D9E75" stroke-width="0.75"/>
<text x="320" y="410" text-anchor="middle" font-size="12" font-weight="600" fill="#04342C">isCardExpired()</text>
<text x="320" y="427" text-anchor="middle" font-size="10" fill="#0F6E56">compare card MM/YY with today's date</text>
<line x1="440" y1="415" x2="459" y2="415" stroke="#993C1D" stroke-width="1" marker-end="url(#ae)"/>
<rect x="461" y="401" width="185" height="28" rx="5" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="553" y="415" text-anchor="middle" dominant-baseline="central" font-size="10.5" fill="#712B13">EXPIRED_CARD  →  restart</text>

<line x1="320" y1="436" x2="320" y2="454" stroke="#1D9E75" stroke-width="1" marker-end="url(#at)"/>

<!-- isValidCardPAN Luhn -->
<rect x="200" y="456" width="240" height="42" rx="6" fill="white" stroke="#1D9E75" stroke-width="0.75"/>
<text x="320" y="472" text-anchor="middle" font-size="12" font-weight="600" fill="#04342C">isValidCardPAN()  —  Luhn</text>
<text x="320" y="489" text-anchor="middle" font-size="10" fill="#0F6E56">ISO/IEC 7812 checksum algorithm</text>
<line x1="440" y1="477" x2="459" y2="477" stroke="#993C1D" stroke-width="1" marker-end="url(#ae)"/>
<rect x="461" y="463" width="185" height="28" rx="5" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="553" y="477" text-anchor="middle" dominant-baseline="central" font-size="10.5" fill="#712B13">INVALID_CARD  →  restart</text>

<line x1="320" y1="498" x2="320" y2="516" stroke="#1D9E75" stroke-width="1" marker-end="url(#at)"/>

<!-- getTransactionAmount -->
<rect x="200" y="518" width="240" height="42" rx="6" fill="white" stroke="#1D9E75" stroke-width="0.75"/>
<text x="320" y="534" text-anchor="middle" font-size="12" font-weight="600" fill="#04342C">getTransactionAmount()</text>
<text x="320" y="551" text-anchor="middle" font-size="10" fill="#0F6E56">amount must be &gt; 0</text>
<line x1="440" y1="539" x2="459" y2="539" stroke="#993C1D" stroke-width="1" marker-end="url(#ae)"/>
<rect x="461" y="525" width="185" height="28" rx="5" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="553" y="539" text-anchor="middle" dominant-baseline="central" font-size="10.5" fill="#712B13">INVALID_AMOUNT  →  retry</text>

<line x1="320" y1="560" x2="320" y2="578" stroke="#1D9E75" stroke-width="1" marker-end="url(#at)"/>

<!-- isBelowMaxAmount -->
<rect x="200" y="580" width="240" height="42" rx="6" fill="white" stroke="#1D9E75" stroke-width="0.75"/>
<text x="320" y="596" text-anchor="middle" font-size="12" font-weight="600" fill="#04342C">isBelowMaxAmount()</text>
<text x="320" y="613" text-anchor="middle" font-size="10" fill="#0F6E56">transAmount &lt;= maxTransAmount</text>
<line x1="440" y1="601" x2="459" y2="601" stroke="#993C1D" stroke-width="1" marker-end="url(#ae)"/>
<rect x="461" y="587" width="185" height="28" rx="5" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="553" y="601" text-anchor="middle" dominant-baseline="central" font-size="10.5" fill="#712B13">EXCEED_MAX  →  restart</text>

<line x1="320" y1="622" x2="320" y2="649" stroke="#888780" stroke-width="1.5" marker-end="url(#a)"/>

<!-- ═══════════ SERVER MODULE ═══════════ -->
<rect x="20" y="651" width="640" height="204" rx="10" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
<rect x="20" y="651" width="8" height="204" rx="4" fill="#185FA5"/>
<text x="38" y="667" font-size="10" font-weight="600" fill="#185FA5" letter-spacing="1">SERVER MODULE</text>

<!-- isValidAccount -->
<rect x="200" y="676" width="240" height="42" rx="6" fill="white" stroke="#378ADD" stroke-width="0.75"/>
<text x="320" y="692" text-anchor="middle" font-size="12" font-weight="600" fill="#042C53">isValidAccount()</text>
<text x="320" y="709" text-anchor="middle" font-size="10" fill="#185FA5">search PAN in accountsDataBase[]</text>
<line x1="440" y1="697" x2="459" y2="697" stroke="#993C1D" stroke-width="1" marker-end="url(#ae)"/>
<rect x="461" y="683" width="185" height="28" rx="5" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="553" y="697" text-anchor="middle" dominant-baseline="central" font-size="10.5" fill="#712B13">DECLINED_STOLEN_CARD</text>

<line x1="320" y1="718" x2="320" y2="736" stroke="#378ADD" stroke-width="1" marker-end="url(#as)"/>

<!-- isAmountAvailable -->
<rect x="200" y="738" width="240" height="42" rx="6" fill="white" stroke="#378ADD" stroke-width="0.75"/>
<text x="320" y="754" text-anchor="middle" font-size="12" font-weight="600" fill="#042C53">isAmountAvailable()</text>
<text x="320" y="771" text-anchor="middle" font-size="10" fill="#185FA5">balance &gt;= transAmount</text>
<line x1="440" y1="759" x2="459" y2="759" stroke="#993C1D" stroke-width="1" marker-end="url(#ae)"/>
<rect x="461" y="745" width="185" height="28" rx="5" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="553" y="759" text-anchor="middle" dominant-baseline="central" font-size="10.5" fill="#712B13">DECLINED_INSUFF_FUND</text>

<line x1="320" y1="780" x2="320" y2="798" stroke="#378ADD" stroke-width="1" marker-end="url(#as)"/>

<!-- saveTransaction -->
<rect x="200" y="800" width="240" height="42" rx="6" fill="white" stroke="#378ADD" stroke-width="0.75"/>
<text x="320" y="816" text-anchor="middle" font-size="12" font-weight="600" fill="#042C53">saveTransaction()</text>
<text x="320" y="833" text-anchor="middle" font-size="10" fill="#185FA5">persist to transDataBase[] + deduct balance</text>
<line x1="440" y1="821" x2="459" y2="821" stroke="#993C1D" stroke-width="1" marker-end="url(#ae)"/>
<rect x="461" y="807" width="185" height="28" rx="5" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="553" y="821" text-anchor="middle" dominant-baseline="central" font-size="10.5" fill="#712B13">INTERNAL_SERVER_ERROR</text>

<line x1="320" y1="842" x2="320" y2="864" stroke="#888780" stroke-width="1.5" marker-end="url(#a)"/>

<!-- APPROVED pill -->
<rect x="190" y="866" width="260" height="44" rx="22" fill="#173404"/>
<text x="320" y="888" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="white" letter-spacing="0.5">TRANSACTION APPROVED</text>

</svg>
